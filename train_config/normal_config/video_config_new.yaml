# model:
model_id_with_origin_paths: "Wan-AI/Wan2.1-T2V-1.3B:diffusion_pytorch_model*.safetensors,Wan-AI/Wan2.1-T2V-1.3B:Wan2.1_VAE.pth"

# Models
trainable_models: "dit"
remove_prefix_in_ckpt: "pipe.dit"
mode: regression
denoise_step: 0.5 
training_target: "x"

lora_base_model: "dit"
lora_rank: 512

# Loss
grad_loss: true
grad_co: 0.5
use_latent_flow: true

# Load and save
resume: true
training_state_dir: "saves/v005"
load_optimizer: true
output_path: "saves/v005"
global_step: 0

# train:
num_epochs: 1000000
gradient_accumulation_steps: 16
validate_step: 300
init_validate: true

# Hyperparam:
clip_grad_norm: true
learning_rate: 1e-4
use_gradient_checkpointing: true
gradient_checkpoint_every_n: 4
log_step: 10
no_extra_frame: true
warmup_steps: 0
mixed_precision: "bf16"
train_all: false

# validate
denoise_strength: 1
validation_scheduler_timesteps: 1
max_validation_batches: 10

# dataset:
dataloader_num_workers: 4
train_ratio: 1

# Prob order: [hypersim_image, synthhuman_image, infinigen_image, vkitti_image, tartanair_video, vkitti_video]
# With image batch_size reduced from 8 to 4, keep image/video exposure close to the
# original DVD training mix while adding SynthHuman as another image source.
prob: [9, 0, 0, 0, 40, 0]
batch_size: 8

# Image
# hypersim_dataset:
train_data_dir_hypersim: "../datasets/hypersim"
train_data_dir_synthhuman: "../datasets/SynthHuman"
train_data_dir_infinigen: "../datasets/infinigen"
train_infinigen_manifest: null
resolution_hypersim: [480, 640]
random_flip: true
norm_type: "trunc_disparity"
truncnorm_min: 0.02
align_cam_normal: false

# vkitti
train_data_dir_vkitti: '../datasets/vkitti_2.0.3'

# Video
max_num_frame: 45
min_num_frame: 45
max_sample_stride: 1
min_sample_stride: 1

train_data_dir_ttr_vid: "../datasets/tartanair"
train_data_dir_vkitti_vid: '../datasets/vkitti_2.0.3'

# test_set
test_batch_size: 1
test_max_num_frame: 45
test_min_num_frame: 45
test_max_sample_stride: 1
test_min_sample_stride: 1

kitti_vid_test_data_root: "your_kitti_depth_dir"
scannet_vid_test_data_root: 'your_scannet_dir'
scannet_split_ls: 'configs/scannetv1_test.txt'
nyuv2_test_data_root: 'your_nyuv2_dir'
infinigen_test_data_root: "../datasets_network/infinigen"
infinigen_test_manifest: "configs/infinigen_val.txt"
infinigen_test_dataset_type: "video"

# Unique setting
scheduler_training_weight_type: "equal" # late, equal, default
training_schedule_mode: "default" # cosine, linear, default
training_scheduler_timesteps: 1
